<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Discussion Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 193, 7, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 193, 7, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-2%, -2%); }
            66% { transform: translate(2%, 1%); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #ffc107;
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 50%, #ffc107 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 193, 7, 0.1);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .stat span {
            color: #ffc107;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Topics Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
            flex: 1;
        }

        /* Topic Card */
        .topic-card {
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 193, 7, 0.1);
            position: relative;
            animation: fadeInUp 0.6s ease backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topic-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ffc107;
            box-shadow: 0 20px 40px rgba(255, 193, 7, 0.2);
        }

        /* Card Image */
        .card-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.5s ease;
        }

        .topic-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, #111 100%);
        }

        .card-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ffc107;
            color: #000;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Card Content */
        .card-content {
            padding: 1.5rem;
            position: relative;
            background: #111;
        }

        .topic-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .topic-description {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .topic-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #666;
        }

        .question-count {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .question-count::before {
            content: '💬';
            font-size: 0.8rem;
        }

        .arrow {
            color: #ffc107;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .topic-card:hover .arrow {
            transform: translateX(5px);
        }

        /* FLOATING STATIC RANDOM BUTTON */
        .floating-random {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            animation: fadeInUp 0.6s ease, glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(255, 193, 7, 0);
            }
        }

        .random-btn {
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%);
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .random-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .random-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .random-btn:hover {
            transform: scale(1.05);
            gap: 1.2rem;
        }

        .random-btn:active {
            transform: scale(0.98);
        }

        .random-icon {
            font-size: 1.5rem;
            transition: transform 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .random-btn:hover .random-icon {
            transform: rotate(360deg);
        }

        .random-text {
            position: relative;
            z-index: 1;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .floating-random {
                bottom: 1rem;
                right: 1rem;
            }
            .random-btn {
                padding: 0.8rem 1.5rem;
            }
            .random-text {
                font-size: 0.8rem;
            }
            .logo {
                font-size: 3rem;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #111;
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 2px solid #ffc107;
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-emoji { font-size: 4rem; margin-bottom: 1rem; }
        .modal-title { font-size: 1.8rem; font-weight: 700; color: #ffc107; }
        .modal-desc { color: #888; margin: 1rem 0; }
        .modal-buttons { display: flex; gap: 1rem; justify-content: center; }
        .modal-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .modal-btn-primary { background: #ffc107; color: #000; }
        .modal-btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }

        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <h1 class="logo">SPEAK UP</h1>
        <p class="subtitle">Dynamic Discussions • Pair Work • B2 Level</p>
        <div class="stats">
            <div class="stat"><span>10</span> Topics</div>
            <div class="stat"><span>8</span> Questions Each</div>
            <div class="stat"><span>4</span> Minute Timer</div>
        </div>
    </div>

    <div class="topics-grid" id="topicsGrid"></div>
    
    <div class="footer">
        <p>Click any topic to start your discussion • Pair roles + timer included</p>
    </div>
</div>

<!-- FLOATING RANDOM BUTTON -->
<div class="floating-random">
    <button class="random-btn" id="randomBtn">
        <span class="random-icon">🎲</span>
        <span class="random-text">RANDOM TOPIC</span>
        <span class="random-icon">✨</span>
    </button>
</div>

<!-- Modal -->
<div class="modal" id="randomModal">
    <div class="modal-content">
        <div class="modal-emoji" id="modalEmoji">🎲</div>
        <h2 class="modal-title" id="modalTitle">Random Topic</h2>
        <p class="modal-desc" id="modalDesc">Click to start your discussion</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="modalConfirmBtn">Open Topic →</button>
            <button class="modal-btn modal-btn-secondary" id="modalCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ONLY THE 10 TOPICS YOU HAVE CREATED
    const TOPICS = [
        { name: 'Communication', tag: 'Society', image: 'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=600&h=400&fit=crop', desc: 'Discuss how we connect in the digital age', questions: 8, file: 'topics/communication.html' },
        { name: 'Binge Watching', tag: 'Media', image: 'https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=600&h=400&fit=crop', desc: 'Streaming habits and modern entertainment', questions: 8, file: 'topics/binge-watching.html' },
        { name: 'Family & Regrets', tag: 'Personal', image: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=600&h=400&fit=crop', desc: 'Reflect on relationships and life choices', questions: 8, file: 'topics/family-regrets.html' },
        { name: 'Culture', tag: 'Society', image: 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=600&h=400&fit=crop', desc: 'Explore traditions and global perspectives', questions: 8, file: 'topics/culture.html' },
        { name: 'Technology', tag: 'Digital', image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&h=400&fit=crop', desc: 'AI, gadgets, and the future of innovation', questions: 8, file: 'topics/technology.html' },
        { name: 'Money & Investing', tag: 'Finance', image: 'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=600&h=400&fit=crop', desc: 'Smart spending, saving, and wealth', questions: 8, file: 'topics/money-investing.html' },
        { name: 'Crime & Safety', tag: 'Law', image: 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=600&h=400&fit=crop', desc: 'Justice, security, and safer communities', questions: 8, file: 'topics/crime-safety.html' },
        { name: 'Emotions', tag: 'Psychology', image: 'https://images.unsplash.com/photo-1544723795-3fb6469f5b39?w=600&h=400&fit=crop', desc: 'Feelings, empathy, and mental wellness', questions: 8, file: 'topics/emotions.html' },
        { name: 'Career & Creativity', tag: 'Future', image: 'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&h=400&fit=crop', desc: 'Work, innovation, and creative thinking', questions: 8, file: 'topics/career-creativity.html' },
        { name: 'Memory & Life', tag: 'Philosophy', image: 'https://images.unsplash.com/photo-1507146426996-ef05306b995a?w=600&h=400&fit=crop', desc: 'Nostalgia, growth, and life stages', questions: 8, file: 'topics/memory-life.html' }
    ];

    let pendingRandomTopic = null;

    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    }

    function renderTopics() {
        const grid = document.getElementById('topicsGrid');
        grid.innerHTML = TOPICS.map((topic, index) => `
            <div class="topic-card" style="animation-delay: ${index * 0.03}s" data-topic-index="${index}">
                <div class="card-image" style="background-image: url('${topic.image}')">
                    <span class="card-tag">${topic.tag}</span>
                </div>
                <div class="card-content">
                    <h3 class="topic-name">${topic.name}</h3>
                    <p class="topic-description">${topic.desc}</p>
                    <div class="topic-meta">
                        <span class="question-count">${topic.questions} questions</span>
                        <span class="arrow">→</span>
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.topic-card').forEach((card, idx) => {
            card.addEventListener('click', () => {
                const topic = TOPICS[idx];
                window.location.href = topic.file;
            });
        });
    }

    function animateRandomIcon() {
        const btn = document.querySelector('.random-btn');
        const icons = document.querySelectorAll('.random-icon');
        btn.style.transform = 'scale(0.95)';
        icons.forEach(icon => {
            icon.style.transform = 'rotate(360deg)';
        });
        setTimeout(() => { 
            btn.style.transform = ''; 
            icons.forEach(icon => {
                icon.style.transform = '';
            });
        }, 300);
    }

    function showRandomTopic() {
        const randomIndex = Math.floor(Math.random() * TOPICS.length);
        pendingRandomTopic = TOPICS[randomIndex];
        
        const modal = document.getElementById('randomModal');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        
        const emojis = ['🎲', '💬', '🎯', '💡', '🔥', '✨', '🎤', '💭'];
        modalEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        modalTitle.textContent = pendingRandomTopic.name;
        modalDesc.textContent = `${pendingRandomTopic.tag} · ${pendingRandomTopic.questions} discussion questions · 4 minute timer`;
        
        modal.classList.add('show');
    }

    function confirmRandomTopic() {
        if (pendingRandomTopic) {
            window.location.href = pendingRandomTopic.file;
        }
        closeModal();
    }

    function closeModal() {
        document.getElementById('randomModal').classList.remove('show');
        pendingRandomTopic = null;
    }

    createParticles();
    renderTopics();
    
    document.getElementById('randomBtn').addEventListener('click', () => {
        animateRandomIcon();
        setTimeout(showRandomTopic, 200);
    });
    document.getElementById('modalConfirmBtn').addEventListener('click', confirmRandomTopic);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    
    document.getElementById('randomModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('randomModal')) {
            closeModal();
        }
    });
</script>
</body>
</html>
