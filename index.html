<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Up · Discussion Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 193, 7, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 193, 7, 0.05) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-2%, -2%); }
            66% { transform: translate(2%, 1%); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: #ffc107;
            border-radius: 50%;
            opacity: 0.3;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            from {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            to {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 50%, #ffc107 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #888;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(255, 193, 7, 0.1);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            border: 1px solid rgba(255, 193, 7, 0.2);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .stat span {
            color: #ffc107;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Topics Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-bottom: 3rem;
            flex: 1;
        }

        /* Topic Card */
        .topic-card {
            background: #111;
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 193, 7, 0.1);
            position: relative;
            animation: fadeInUp 0.6s ease backwards;
            animation-delay: calc(var(--i, 0) * 0.03s);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .topic-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #ffc107;
            box-shadow: 0 20px 40px rgba(255, 193, 7, 0.2);
        }

        /* Card Image */
        .card-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.5s ease;
        }

        .topic-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, #111 100%);
        }

        .card-tag {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ffc107;
            color: #000;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 2;
            text-transform: uppercase;
        }

        /* Card Content */
        .card-content {
            padding: 1.5rem;
            position: relative;
            background: #111;
        }

        .topic-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .topic-description {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.4;
            margin-bottom: 1rem;
        }

        .topic-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #666;
        }

        .question-count {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .question-count::before {
            content: '💬';
            font-size: 0.8rem;
        }

        .arrow {
            color: #ffc107;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .topic-card:hover .arrow {
            transform: translateX(5px);
        }

        /* FLOATING STATIC RANDOM BUTTON - Always visible bottom right */
        .floating-random {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            animation: fadeInUp 0.6s ease, glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(255, 193, 7, 0);
            }
        }

        .random-btn {
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%);
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }

        .random-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .random-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .random-btn:hover {
            transform: scale(1.05);
            gap: 1.2rem;
        }

        .random-btn:active {
            transform: scale(0.98);
        }

        .random-icon {
            font-size: 1.5rem;
            transition: transform 0.5s ease;
            position: relative;
            z-index: 1;
        }

        .random-btn:hover .random-icon {
            transform: rotate(360deg);
        }

        .random-text {
            position: relative;
            z-index: 1;
            font-size: 0.9rem;
        }

        /* Responsive random button for mobile */
        @media (max-width: 768px) {
            .floating-random {
                bottom: 1rem;
                right: 1rem;
                left: auto;
            }
            .random-btn {
                padding: 0.8rem 1.5rem;
            }
            .random-text {
                display: inline-block;
                font-size: 0.8rem;
            }
            .random-icon {
                font-size: 1.2rem;
            }
        }

        /* Random Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #111;
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 2px solid #ffc107;
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffc107;
            margin-bottom: 0.5rem;
        }

        .modal-desc {
            color: #888;
            margin-bottom: 1.5rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .modal-btn-primary {
            background: #ffc107;
            color: #000;
        }

        .modal-btn-primary:hover {
            background: #ff8f00;
            transform: translateY(-2px);
        }

        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="particles" id="particles"></div>

<div class="container">
    <div class="header">
        <h1 class="logo">SPEAK UP</h1>
        <p class="subtitle">Dynamic Discussions • Pair Work • B2 Level</p>
        <div class="stats">
            <div class="stat"><span>20</span> Topics</div>
            <div class="stat"><span>4</span> Questions Each</div>
            <div class="stat"><span>4</span> Minute Timer</div>
        </div>
    </div>

    <div class="topics-grid" id="topicsGrid"></div>
    
    <div class="footer">
        <p>Click any topic to start your discussion • Pair roles + timer included</p>
    </div>
</div>

<!-- FLOATING STATIC RANDOM BUTTON - Always visible -->
<div class="floating-random">
    <button class="random-btn" id="randomBtn">
        <span class="random-icon">🎲</span>
        <span class="random-text">RANDOM TOPIC</span>
        <span class="random-icon">✨</span>
    </button>
</div>

<!-- Random Topic Modal -->
<div class="modal" id="randomModal">
    <div class="modal-content">
        <div class="modal-emoji" id="modalEmoji">🎲</div>
        <h2 class="modal-title" id="modalTitle">Random Topic</h2>
        <p class="modal-desc" id="modalDesc">Click to start your discussion</p>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-primary" id="modalConfirmBtn">Open Topic →</button>
            <button class="modal-btn modal-btn-secondary" id="modalCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // 20 TOPICS with unique images and descriptions
    const TOPICS = [
        { id: 'A', name: 'Communication', tag: 'Society', color: '#ffc107', image: 'https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=600&h=400&fit=crop', desc: 'Discuss how we connect in the digital age', questions: 4 },
        { id: 'B', name: 'Binge Watching', tag: 'Media', color: '#ffc107', image: 'https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=600&h=400&fit=crop', desc: 'Streaming habits and modern entertainment', questions: 4 },
        { id: 'C', name: 'Family & Regrets', tag: 'Personal', color: '#ffc107', image: 'https://images.unsplash.com/photo-1511895426328-dc8714191300?w=600&h=400&fit=crop', desc: 'Reflect on relationships and life choices', questions: 4 },
        { id: 'D', name: 'Culture', tag: 'Society', color: '#ffc107', image: 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=600&h=400&fit=crop', desc: 'Explore traditions and global perspectives', questions: 4 },
        { id: 'E', name: 'Technology', tag: 'Digital', color: '#ffc107', image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&h=400&fit=crop', desc: 'AI, gadgets, and the future of innovation', questions: 4 },
        { id: 'F', name: 'Money & Investing', tag: 'Finance', color: '#ffc107', image: 'https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?w=600&h=400&fit=crop', desc: 'Smart spending, saving, and wealth', questions: 4 },
        { id: 'G', name: 'Crime & Safety', tag: 'Law', color: '#ffc107', image: 'https://images.unsplash.com/photo-1505751172876-fa1923c5c528?w=600&h=400&fit=crop', desc: 'Justice, security, and safer communities', questions: 4 },
        { id: 'H', name: 'Emotions', tag: 'Psychology', color: '#ffc107', image: 'https://images.unsplash.com/photo-1544723795-3fb6469f5b39?w=600&h=400&fit=crop', desc: 'Feelings, empathy, and mental wellness', questions: 4 },
        { id: 'I', name: 'Career & Creativity', tag: 'Future', color: '#ffc107', image: 'https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600&h=400&fit=crop', desc: 'Work, innovation, and creative thinking', questions: 4 },
        { id: 'J', name: 'Memory & Life', tag: 'Philosophy', color: '#ffc107', image: 'https://images.unsplash.com/photo-1507146426996-ef05306b995a?w=600&h=400&fit=crop', desc: 'Nostalgia, growth, and life stages', questions: 4 },
        { id: 'K', name: 'Social Media', tag: 'Digital', color: '#ffc107', image: 'https://images.unsplash.com/photo-1611926653458-09294b3142bf?w=600&h=400&fit=crop', desc: 'Influence, addiction, and online culture', questions: 4 },
        { id: 'L', name: 'Travel', tag: 'Adventure', color: '#ffc107', image: 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=600&h=400&fit=crop', desc: 'Journeys, cultures, and wanderlust', questions: 4 },
        { id: 'M', name: 'Education', tag: 'Learning', color: '#ffc107', image: 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=600&h=400&fit=crop', desc: 'Schools, skills, and lifelong learning', questions: 4 },
        { id: 'N', name: 'Health & Fitness', tag: 'Wellness', color: '#ffc107', image: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=600&h=400&fit=crop', desc: 'Exercise, nutrition, and well-being', questions: 4 },
        { id: 'O', name: 'Environment', tag: 'Nature', color: '#ffc107', image: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=400&fit=crop', desc: 'Climate change and conservation', questions: 4 },
        { id: 'P', name: 'Leadership', tag: 'Work', color: '#ffc107', image: 'https://images.unsplash.com/photo-1552664730-d307ca884978?w=600&h=400&fit=crop', desc: 'Guiding teams and making decisions', questions: 4 },
        { id: 'Q', name: 'Art & Design', tag: 'Creative', color: '#ffc107', image: 'https://images.unsplash.com/photo-1460661419201-fd4cecdf8a8b?w=600&h=400&fit=crop', desc: 'Creativity, aesthetics, and expression', questions: 4 },
        { id: 'R', name: 'Future Predictions', tag: 'Futurism', color: '#ffc107', image: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=600&h=400&fit=crop', desc: 'Tomorrow\'s world and possibilities', questions: 4 },
        { id: 'S', name: 'Food & Cuisine', tag: 'Gastronomy', color: '#ffc107', image: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&h=400&fit=crop', desc: 'Cooking, flavors, and food culture', questions: 4 },
        { id: 'T', name: 'Happiness', tag: 'Philosophy', color: '#ffc107', image: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&h=400&fit=crop', desc: 'What truly makes us happy?', questions: 4 }
    ];

    let pendingRandomTopic = null;

    // Create floating particles
    function createParticles() {
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particlesContainer.appendChild(particle);
        }
    }

    // Render topics grid
    function renderTopics() {
        const grid = document.getElementById('topicsGrid');
        grid.innerHTML = TOPICS.map((topic, index) => `
            <div class="topic-card" style="animation-delay: ${index * 0.03}s" data-topic-id="${topic.id}">
                <div class="card-image" style="background-image: url('${topic.image}')">
                    <span class="card-tag">${topic.tag}</span>
                </div>
                <div class="card-content">
                    <h3 class="topic-name">${topic.name}</h3>
                    <p class="topic-description">${topic.desc}</p>
                    <div class="topic-meta">
                        <span class="question-count">${topic.questions} questions</span>
                        <span class="arrow">→</span>
                    </div>
                </div>
            </div>
        `).join('');

        // Add click listeners
        document.querySelectorAll('.topic-card').forEach((card, index) => {
            card.addEventListener('click', () => {
                const topic = TOPICS[index];
                openTopic(topic);
            });
        });
    }

    // Open topic (placeholder - will link to actual topic pages)
    function openTopic(topic) {
        // For now, show alert since we're just building the menu
        // In production, this would navigate to: `topics/${topic.name.toLowerCase().replace(/ /g, '-')}.html`
        alert(`Opening: ${topic.name}\n\nIn the full platform, this would load the discussion page with timer and 4 questions.`);
    }

    // Random button with animation
    function animateRandomIcon() {
        const btn = document.querySelector('.random-btn');
        const icons = document.querySelectorAll('.random-icon');
        btn.style.transform = 'scale(0.95)';
        icons.forEach(icon => {
            icon.style.transform = 'rotate(360deg)';
        });
        setTimeout(() => { 
            btn.style.transform = ''; 
            icons.forEach(icon => {
                icon.style.transform = '';
            });
        }, 300);
    }

    function showRandomTopic() {
        const randomIndex = Math.floor(Math.random() * TOPICS.length);
        pendingRandomTopic = TOPICS[randomIndex];
        
        const modal = document.getElementById('randomModal');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        
        // Animated emoji based on topic
        const emojis = ['🎲', '💬', '🎯', '💡', '🔥', '✨', '🎤', '💭'];
        modalEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        modalTitle.textContent = pendingRandomTopic.name;
        modalDesc.textContent = `${pendingRandomTopic.tag} · ${pendingRandomTopic.questions} discussion questions · 4 minute timer`;
        
        modal.classList.add('show');
    }

    function confirmRandomTopic() {
        if (pendingRandomTopic) {
            openTopic(pendingRandomTopic);
        }
        closeModal();
    }

    function closeModal() {
        document.getElementById('randomModal').classList.remove('show');
        pendingRandomTopic = null;
    }

    // Initialize
    createParticles();
    renderTopics();
    
    // Event listeners
    document.getElementById('randomBtn').addEventListener('click', () => {
        animateRandomIcon();
        setTimeout(showRandomTopic, 200);
    });
    document.getElementById('modalConfirmBtn').addEventListener('click', confirmRandomTopic);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    
    // Close modal on background click
    document.getElementById('randomModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('randomModal')) {
            closeModal();
        }
    });

    // Add hover shine effect to cards
    const style = document.createElement('style');
    style.textContent = `
        .topic-card {
            --mouse-x: 0px;
            --mouse-y: 0px;
        }
        .topic-card:hover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255, 193, 7, 0.15), transparent 70%);
            pointer-events: none;
            border-radius: 24px;
        }
    `;
    document.head.appendChild(style);

    // Track mouse position for shine effect
    document.addEventListener('mousemove', (e) => {
        const cards = document.querySelectorAll('.topic-card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            }
        });
    });
</script>
</body>
</html>
